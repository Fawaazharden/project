    <style>
      @import url("https://fonts.googleapis.com/css?family=Inter:900,700,800,500,400,600|Manrope:500,400|Poppins:600&display=swap");
      
      /* Custom animations for AI button */
      @keyframes bounceOnce {
        0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
        40% {transform: translateY(-20px);}
        60% {transform: translateY(-10px);}
      }
      
      @keyframes pulse {
        0% {transform: scale(1); opacity: 0.9;}
        50% {transform: scale(2); opacity: 0.4;}
        100% {transform: scale(1); opacity: 0.9;}
      }
      
      @keyframes ripple {
        0% {transform: scale(0.8); opacity: 1;}
        100% {transform: scale(3); opacity: 0;}
      }
      
      @keyframes glow {
        0%, 100% {box-shadow: 0 0 15px rgba(113, 127, 232, 0.7);}
        50% {box-shadow: 0 0 25px 5px rgba(149, 74, 210, 0.9);}
      }
      
      @keyframes soundWave {
        0%, 100% {transform: scaleY(0.4);}
        20% {transform: scaleY(1);}
        40% {transform: scaleY(0.6);}
        60% {transform: scaleY(0.8);}
        80% {transform: scaleY(0.5);}
      }
      
      .ai-button {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 50px;
        background: linear-gradient(135deg, #717fe8 0%, #954ad2 100%);
        color: white;
        font-weight: 600;
        font-size: 18px;
        box-shadow: 0 4px 20px rgba(113, 127, 232, 0.5);
        transition: all 0.3s ease;
        z-index: 9999;
        animation: glow 3s infinite, bounceOnce 2s ease-in-out 1s 1;
        overflow: visible; /* Allow content to overflow for the pulsing dot */
      }
      
      /* Style for the button text to ensure it's properly contained */
      #button-text {
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 150px; /* Limit width to prevent overflow */
      }
      
      .ai-button:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 25px rgba(113, 127, 232, 0.7);
      }
      
      .ai-button .wave-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        margin-right: 12px;
      }
      
      .ai-button .wave-bar {
        display: inline-block;
        width: 4px;
        height: 12px;
        margin: 0 2px;
        border-radius: 2px;
        background-color: white;
      }
      
      .ai-button .wave-bar:nth-child(1) {
        animation: soundWave 1.5s ease-in-out infinite;
        animation-delay: -0.3s;
      }
      
      .ai-button .wave-bar:nth-child(2) {
        animation: soundWave 1.5s ease-in-out infinite;
        animation-delay: -0.15s;
      }
      
      .ai-button .wave-bar:nth-child(3) {
        animation: soundWave 1.5s ease-in-out infinite;
      }
      
      /* Standalone pulsing dot positioned outside the button */
      .ai-button .pulse-dot {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background-color: #ff3366;
        z-index: 10000; /* Ensure it's above all other elements */
        display: block; /* Ensure the dot is visible */
        box-shadow: 0 0 10px #ff3366;
      }
      
      .ai-button .pulse-ring {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background-color: #ff3366;
        opacity: 0.7;
        animation: pulse 2s infinite;
        display: block; /* Ensure the ring is visible */
        z-index: 9999; /* Ensure proper stacking */
        box-shadow: 0 0 10px rgba(255, 51, 102, 0.7);
      }
      
      /* Multiple ripple rings for enhanced effect */
      .ai-button .ripple {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background-color: transparent;
        border: 2px solid #ff3366;
        animation: ripple 2s infinite;
        display: block; /* Ensure the ripple is visible */
        z-index: 9998; /* Ensure proper stacking */
      }
      
      .ai-button .ripple:nth-child(2) {
        animation-delay: 0.5s;
      }
      
      .ai-button .ripple:nth-child(3) {
        animation-delay: 1s;
      }
      
      /* Hide any other buttons with the same class that might be rendered by React */
      .ai-button:not(#retell-ai-button) {
        display: none !important;
      }
      
      /* Retell integration button states */
      .ai-button.starting {
        opacity: 0.7;
        transition: opacity 0.5s;
      }
      .ai-button.ongoing {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        box-shadow: 0 4px 20px rgba(40, 167, 69, 0.5);
      }
      .ai-button.error {
        background: linear-gradient(135deg, #dc3545 0%, #e74c3c 100%);
        box-shadow: 0 4px 20px rgba(220, 53, 69, 0.5);
      }
      
      /* Hide pulsing dot when call is ongoing */
      .ai-button.ongoing .pulse-dot,
      .ai-button.ongoing .pulse-ring,
      .ai-button.ongoing .ripple {
        display: none !important;
      }
    </style>

    <script>
      window.addEventListener('load', () => {
        const btn = document.getElementById('retell-ai-button');
        if (btn) {
          btn.addEventListener('click', async (e) => {
            // Lazy load the Retell SDK bundle only on interaction
            const mod = await import('./src/retell-complete-implementation.js');
            if (mod && mod.startCall) {
              e.preventDefault();
              mod.startCall();
            }
          }, { once: true });
        }
      });
    </script>
